version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dominion:dominion_p@postgres:5432/dominion_db?schema=public
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=dominion
      - POSTGRES_PASSWORD=dominion_p
      - POSTGRES_DB=dominion_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  redis-data:
  postgres-data:
